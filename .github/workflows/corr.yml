name: Correlation Panel Update (JST 07:30 / 11:00)

# SPEC_MONEYFLOW.md §8. correlations / money_flow.<region>.sink_metrics を
# docs/data.json へ read-modify-write マージする専用ワークフロー。
# 元データ(株価指数・利回り・為替)が日次更新のため、3時間毎などの高頻度更新は
# 不採用。間隔を変える場合は下の cron 1行を変更するだけでよい。

on:
  schedule:
    # 30 22 * * 0-4 (UTC) = 07:30 JST 月-金。米国クローズ + FRED反映後。
    - cron: "30 22 * * 0-4"
    # 0 2 * * 1-5 (UTC) = 11:00 JST 月-金。財務省JGB利回り公表後。
    - cron: "0 2 * * 1-5"
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Needed to push data.json back to repo

jobs:
  update-correlations:
    name: Fetch & Merge Correlation Panel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Fetch + compute + read-modify-write merge into docs/data.json ─
      - name: Build correlation panel
        run: python3 pipeline/build_corr.py

      # ── 4a. Schema gate (fail-fast on contract regression) ─
      - name: Verify contracts (pytest)
        run: |
          pip install pytest
          pytest tests/test_money_flow_schema.py \
                 tests/test_index_html_contract.py \
                 tests/test_survival_loop_schema.py \
                 tests/test_risk_ceiling.py \
                 tests/test_pattern_table_invariants.py \
                 tests/test_bankruptcy_simulator.py \
                 -q

      # ── 5. Commit updated data.json (no-op guard: skip empty commits) ──
      - name: Commit data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add docs/data.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore(corr): $(date -u '+%Y-%m-%d %H:%M UTC')"

      # ── 6. Push (競合リトライ付き) ─────────────────────
      # 並走push(人間/他workflow)による non-fast-forward 拒否で赤×に
      # なるのを防ぐ。rebase採用の根拠: bot commit は生成物のみで、
      # rebase 後も直前のビルド結果として正しいまま。
      # 同内容が先に反映済みの場合は rebase が commit を落とし、push は
      # "Everything up-to-date" となり「commitなし=成功」で緑終了する。
      # rebase 衝突は自己解決せず abort して exit 1。
      - name: Push changes (with conflict retry)
        run: |
          BRANCH="$GITHUB_REF_NAME"
          for attempt in 1 2 3 4; do   # 1=初回, 2-4=リトライ最大3回
            if ! git pull --rebase --autostash origin "$BRANCH"; then
              git rebase --abort || true
              echo "::error::git pull --rebase failed (attempt ${attempt}): conflict requires manual resolution"
              exit 1
            fi
            if git push origin "HEAD:${BRANCH}"; then
              echo "Push succeeded (attempt ${attempt})"
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}), re-rebasing..."
          done
          echo "::error::Push failed after 3 retries"
          exit 1
