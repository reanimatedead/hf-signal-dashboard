name: Weekend Autocollect (Fri-Mon JST)

# SPEC_AUTOCOLLECT.md §1.
# - 木〜土 UTC 15:00 = 金〜日 0:00 JST (週末3日分)
# - 日 UTC 18:00 = 月 3:00 JST (週明け追加 1 本)
# update_signals.yml (毎日 0:00 JST) と曜日が部分的に重なるが、collect.yml は
# data/history と data/collect_log を更新する別ジョブで衝突しない。

on:
  schedule:
    - cron: "0 15 * * 4,5,6"
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    name: Fetch + Snapshot + Log
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # 取得 + 履歴 + ログ。collector.cli は 1 ソース失敗で死なない。
      - name: Run collector (fetch → snapshot → log)
        run: python -m collector.cli --workflow=collect

      # collector.cli も data.json を全再構築する経路を含むため correlations を
      # 再マージする(fetch_signals.py は編集禁止のため後段で注入)。
      - name: Re-merge correlations (preserve corr block)
        run: python3 pipeline/build_corr.py

      # 契約ゲート: Phase 1 + Phase 1.5 の回帰防止。
      - name: pytest contract gate
        run: |
          pytest tests/test_money_flow_schema.py \
                 tests/test_index_html_contract.py \
                 tests/test_survival_loop_schema.py \
                 tests/test_risk_ceiling.py \
                 tests/test_pattern_table_invariants.py \
                 tests/test_bankruptcy_simulator.py \
                 tests/test_collector_idempotent.py \
                 tests/test_collector_schema.py \
                 tests/test_collector_resilience.py \
                 tests/test_collect_workflow.py \
                 -q

      - name: Commit history + log
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add docs/data.json docs/data/macro.json \
                  data/history/ data/collect_log.jsonl
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore(autocollect): $(date -u '+%Y-%m-%d %H:%M UTC')"

      # 並走push(人間/他workflow)による non-fast-forward 拒否で赤×になるのを
      # 防ぐ競合リトライ。rebase採用の根拠: bot commit は生成物のみで、rebase
      # 後も直前のビルド結果として正しいまま。同内容が先に反映済みなら rebase
      # が commit を落とし「commitなし=成功」で緑終了。衝突は自己解決せず exit 1。
      - name: Push (with conflict retry)
        run: |
          BRANCH="$GITHUB_REF_NAME"
          for attempt in 1 2 3 4; do   # 1=初回, 2-4=リトライ最大3回
            if ! git pull --rebase --autostash origin "$BRANCH"; then
              git rebase --abort || true
              echo "::error::git pull --rebase failed (attempt ${attempt}): conflict requires manual resolution"
              exit 1
            fi
            if git push origin "HEAD:${BRANCH}"; then
              echo "Push succeeded (attempt ${attempt})"
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}), re-rebasing..."
          done
          echo "::error::Push failed after 3 retries"
          exit 1
