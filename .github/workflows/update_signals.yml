name: Daily Signal Update (00:00 JST)

on:
  schedule:
    # 00:00 JST = 15:00 UTC (same day). SPEC_MONEYFLOW.md §6.1.
    - cron: "0 15 * * *"
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Needed to push data.json back to repo

jobs:
  update-signals:
    name: Fetch & Generate Signals
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run signal generation (incl. v4.1 money_flow) ─
      - name: Generate signals
        run: python fetch_signals.py

      # ── 4a. Schema gate (fail-fast on contract regression) ─
      - name: Verify data.json contract (pytest)
        run: |
          pip install pytest
          pytest tests/test_money_flow_schema.py tests/test_index_html_contract.py -q

      # ── 4b. Generate (legacy) macro layer (still wired) ──
      - name: Generate macro layer
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python pipeline/build_macro.py

      # ── 5. Commit updated data.json + macro.json ───────
      - name: Commit data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add docs/data.json docs/data/macro.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update signals $(date -u '+%Y-%m-%d %H:%M UTC')"

      # ── 6. Push ────────────────────────────────────────
      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
