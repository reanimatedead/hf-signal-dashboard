name: Daily Signal Update (08:00 JST)

on:
  schedule:
    # 08:00 JST = 23:00 UTC (previous day)
    - cron: "0 23 * * *"
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Needed to push data.json back to repo

jobs:
  update-signals:
    name: Fetch & Generate Signals
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run signal generation ───────────────────────
      - name: Generate signals
        run: python fetch_signals.py

      # ── 5. Commit updated data.json ────────────────────
      - name: Commit data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add docs/data.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update signals $(date -u '+%Y-%m-%d %H:%M UTC')"

      # ── 6. Push ────────────────────────────────────────
      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
