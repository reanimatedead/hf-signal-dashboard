name: Daily Signal Update (00:00 JST)

on:
  schedule:
    # 00:00 JST = 15:00 UTC (same day). SPEC_MONEYFLOW.md §6.1.
    - cron: "0 15 * * *"
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Needed to push data.json back to repo

jobs:
  update-signals:
    name: Fetch & Generate Signals
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run signal generation (incl. v4.1 money_flow) ─
      - name: Generate signals
        run: python fetch_signals.py

      # ── 4a'. Re-merge correlations (preserve corr block) ──
      # fetch_signals.py は data.json を全再構築するため correlations を
      # 再マージする(fetch_signals.py は編集禁止のため後段で注入)。
      - name: Re-merge correlations (preserve corr block)
        run: python3 pipeline/build_corr.py

      # ── 4a. Schema gate (fail-fast on contract regression) ─
      - name: Verify contracts (pytest)
        run: |
          pip install pytest
          pytest tests/test_money_flow_schema.py \
                 tests/test_index_html_contract.py \
                 tests/test_survival_loop_schema.py \
                 tests/test_risk_ceiling.py \
                 tests/test_pattern_table_invariants.py \
                 tests/test_bankruptcy_simulator.py \
                 -q

      # ── 4b. Generate (legacy) macro layer (still wired) ──
      - name: Generate macro layer
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python pipeline/build_macro.py

      # ── 5. Commit updated data.json + macro.json ───────
      - name: Commit data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add docs/data.json docs/data/macro.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update signals $(date -u '+%Y-%m-%d %H:%M UTC')"

      # ── 6. Push (競合リトライ付き) ─────────────────────
      # 並走push(人間/他workflow)による non-fast-forward 拒否で赤×に
      # なるのを防ぐ。rebase採用の根拠: bot commit は生成物のみで、
      # rebase 後も直前のビルド結果として正しいまま。
      # 同内容が先に反映済みの場合は rebase が commit を落とし、push は
      # "Everything up-to-date" となり「commitなし=成功」で緑終了する。
      # rebase 衝突は自己解決せず abort して exit 1。
      - name: Push changes (with conflict retry)
        run: |
          BRANCH="$GITHUB_REF_NAME"
          for attempt in 1 2 3 4; do   # 1=初回, 2-4=リトライ最大3回
            if ! git pull --rebase --autostash origin "$BRANCH"; then
              git rebase --abort || true
              echo "::error::git pull --rebase failed (attempt ${attempt}): conflict requires manual resolution"
              exit 1
            fi
            if git push origin "HEAD:${BRANCH}"; then
              echo "Push succeeded (attempt ${attempt})"
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}), re-rebasing..."
          done
          echo "::error::Push failed after 3 retries"
          exit 1
